site_name: Quoriv
site_description: Open-source terminal AI coding agent — multi-model, repo-native, permission-aware.
site_url: https://burhanhussain1.github.io/quoriv/
site_author: Burhan Hussain
repo_name: BurhanHussain1/quoriv
repo_url: https://github.com/BurhanHussain1/quoriv
edit_uri: edit/main/docs/

# README.md, CHANGELOG.md, CONTRIBUTING.md, SECURITY.md and PROJECT_PLAN.md
# live at the repo root for GitHub visibility. The pages under docs/
# pull them in via mkdocs-include-markdown-plugin so the site and the
# repo stay in lockstep without duplicating content.
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit
    - toc.follow

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Project plan: project-plan.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Security: security.md

# DEEPAGENTS_REFERENCE.md is included verbatim into architecture.md via
# include-markdown — list it as not-in-nav so MkDocs doesn't warn about
# an orphaned file.
not_in_nav: |
  DEEPAGENTS_REFERENCE.md

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BurhanHussain1/quoriv
