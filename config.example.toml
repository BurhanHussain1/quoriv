# Quoriv configuration example.
#
# Copy this file to one of:
#   ~/.quoriv/config.toml          (global, per-user)
#   <your-repo>/.quoriv/config.toml  (per-project, overrides global)
#
# API keys are NOT stored here. Quoriv keeps them in your OS keychain
# via the `keyring` library. Use `quoriv config set <provider>` once
# the CLI is built.


[model]
# Model identifier format: "provider:name".
#
# Supported providers (Phase 3):
#   openai     OpenAI / Azure OpenAI
#   anthropic  Anthropic Claude
#   gemini     Google Gemini
#   ollama     Local Ollama server
#   vllm       Self-hosted vLLM (OpenAI-compatible endpoint)
#   openrouter OpenRouter (any model via one key)

# Default model used unless overridden by --model or routing.
default = "openai:gpt-4.1"

# Cheap/fast model for trivial calls (routing, summarization).
fast = "openai:gpt-4o-mini"

# Strong model for hard reasoning (planning, coding, debugging).
strong = "openai:gpt-4.1"


[permissions]
# Default permission posture for new sessions:
#   "read-only"  Reads allowed; all writes/shell blocked.
#   "ask"        Prompt before every write or shell call. (default)
#   "auto"       Auto-run safe tools; prompt for risky ones.
#   "yolo"       Run everything without prompts. Use with care.
mode = "ask"


[ui]
# Color theme: "dark" | "light" | "auto"
theme = "dark"


[tools]
# Names of built-in tools to disable.
# Available tool names will be listed under `quoriv /tools` once Phase 1 lands.
disabled = []


# [mcp.servers.NAME]
# Phase 2 Slice 6: external MCP (Model Context Protocol) servers.
# Each registered server's tools are merged into the agent's tools
# list at session start. Requires the [mcp] install extra:
#
#     pip install 'quoriv[mcp]'
#
# Two transports are supported:
#
#   transport = "stdio"   Launch the server as a subprocess. Needs
#                         `command` and optionally `args`/`env`.
#   transport = "sse"     Long-lived HTTP/SSE endpoint. Needs `url`
#                         and optionally `headers` (e.g. bearer tokens).
#
# Example — connect to the `fetch` reference server (stdio) and a
# hypothetical GitHub MCP server (sse):
#
# [mcp.servers.fetch]
# command = "uvx"
# args    = ["mcp-server-fetch"]
#
# [mcp.servers.github]
# transport = "sse"
# url       = "https://mcp.github.example.com"
# headers   = { Authorization = "Bearer ${GITHUB_MCP_TOKEN}" }


# [plugins]
# Phase 2 Slice 5: third-party tool plugins. A plugin is a Python
# package that registers an entry point under the `quoriv.plugins`
# group. The loader (quoriv.plugins.loader.discover_plugin_tools)
# walks every registered entry point at session start and merges the
# returned tools into the agent's tools= list.
#
# To author a plugin, add this to your package's pyproject.toml:
#
#   [project.entry-points."quoriv.plugins"]
#   my_plugin = "my_pkg:plugin_factory"
#
# where `plugin_factory` is a no-argument callable returning an
# iterable of LangChain BaseTool instances (typically @tool-decorated
# functions).
#
# Use `disabled` here to skip a plugin without uninstalling its
# package — useful when a noisy plugin is interfering with the
# current workflow. Names match the entry-point name.
#
# disabled = ["plugin_name_1", "plugin_name_2"]


# [subagents]
# Phase 2 Slice 4: per-task model routing for Quoriv's built-in
# subagents. Three roles ship out of the box, each routed to one of
# the models declared in `[model]` above. Override the `model` field
# to redirect.
#
# Accepted tokens:
#   "default"            use [model].default
#   "fast"               use [model].fast
#   "strong"             use [model].strong
#   "provider:name"      literal — bypass the lookup
#
# [subagents.researcher]
# # Read-only exploration / discovery. Defaults to "fast".
# model = "fast"
#
# [subagents.debugger]
# # Deep-reasoning bug investigation. Defaults to "strong".
# model = "strong"
#
# [subagents.reviewer]
# # Read-only critique of proposed changes. Defaults to "strong".
# model = "strong"


# [cost.rates]
# Per-model USD price overrides for the `/cost` slash command. Keys are
# `provider:model` prefixes matched by longest-prefix lookup — a more
# specific key wins over a broader one (e.g. an entry for
# "openai:gpt-4o-mini" beats "openai:gpt-4o"). User entries shadow the
# built-in table in `quoriv.observability.cost.RATES`, so this is where
# you patch a price when a provider changes their pricing without
# waiting for a Quoriv release.
#
# Both fields are required and must be non-negative floats (USD per
# 1,000 tokens). Local-only providers should use 0.0 for both.
#
# Example — override the built-in gpt-4o price and add a new entry:
#
# [cost.rates."openai:gpt-4o"]
# input_per_1k  = 0.0030
# output_per_1k = 0.0120
#
# [cost.rates."anthropic:claude-opus-5"]
# input_per_1k  = 0.0200
# output_per_1k = 0.1000
